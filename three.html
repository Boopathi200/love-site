<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter</title>
    <link rel="stylesheet" href="style.css">
    <!-- romantic script font -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="romantic-section">
    <video id="bgVideo" autoplay muted loop>
        <source src="img/bg hr.mp4" type="video/mp4">
    </video>
    <!-- central text area -->
    <div class="content-box">
        <p>உன் கை பிடிச்சு தொடங்கின பாதை,<br>
உன் நிழலோடு நடந்த என் வாழ்க்கை,<br>
மூச்சு இருக்குற வரைக்கும் அல்ல,<br>
கடைசி வரைக்கும் நீயே என் காதல். ❤️</p>
    </div>

    <button id="backButton">
        <img src="img/backk.png" alt="Back">
    </button>

    <script>
        // spawn hearts on background clicks, excluding clicks inside content box
        document.body.addEventListener('click', function(e) {
            if (e.target.closest('.content-box')) return;
            const heart = document.createElement('span');
            heart.className = 'heart';
            heart.textContent = '🖤❤️';
            // random size and initial offset
            const size = 20 + Math.random() * 20;
            heart.style.fontSize = size + 'px';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2500);
        });

        // simplified back button always returns to home
        (function(){
            const btn = document.getElementById('backButton');
            if(btn){
                btn.addEventListener('click', function(){
                    window.location.href = 'index.html';
                });
            }
        })();
    </script>
</body>
</html>
