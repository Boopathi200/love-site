<!DOCTYPE html>
<html>
<head>
<title>I Like You 💕</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="love-bg">

<button id="backButton" onclick="history.back()">
  <img src="img/backk.png" alt="Back">
</button>

<h1 id="text"></h1>

<a href="three.html"><img id="centerGif" src="img\gif hug.gif" alt="Love GIF"></a>

<audio autoplay loop>
  <source src="img\song.mp3" type="audio/mp3">
</audio>

<script>
// back button with fallback
(function(){
  const btn = document.getElementById('backButton');
  if(btn){
    btn.addEventListener('click', function(){
      if(history.length>1){
        history.back();
      } else {
        window.location.href='index.html';
      }
    });
  }
})();
</script>
<script src="script.js"></script>
</body>
</html>
