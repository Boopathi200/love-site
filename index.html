<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Audio (continuous) -->
  <audio id="bgAudio" loop>
    <source src="img/song.mp3" type="audio/mp3">
  </audio>

  <!-- PAGE 1: Heart button -->
  <section id="page1" class="center">
    <button class="heart-btn" id="playfulBtn">💖</button>
  </section>

  <!-- PAGE 2: GIF + Typewriter -->
  <section id="page2" class="romantic-section" style="display:none;">
    <button id="backButton2">
      <img src="img/backk.png" alt="Back">
    </button>
    <h1 id="text"></h1>
    <a id="gifLink" href="#">
      <img id="centerGif" src="img/gif_hug.gif" alt="Love GIF">
    </a>
  </section>

  <!-- PAGE 3: Love Letter + floating hearts -->
  <section id="page3" class="romantic-section" style="display:none;">
    <div class="content-box">
      <p>உன் கை பிடிச்சு தொடங்கின பாதை,<br>
         உன் நிழலோடு நடந்த என் வாழ்க்கை,<br>
         மூச்சு இருக்குற வரைக்கும் அல்ல,<br>
         கடைசி வரைக்கும் நீயே என் காதல். ❤️</p>
    </div>
    <button id="backButton3">
      <img src="img/backk.png" alt="Back">
    </button>
  </section>

  <!-- SCRIPT -->
  <script>
    // Sections
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    const btn = document.getElementById('playfulBtn');
    const gifLink = document.getElementById('gifLink');
    const textEl = document.getElementById('text');
    const bgAudio = document.getElementById('bgAudio');

    // Try autoplay
    bgAudio.play().catch(() => console.log("Autoplay blocked"));

    // Start audio on first click anywhere
    document.body.addEventListener('click', () => {
      if(bgAudio.paused) bgAudio.play().catch(e => console.log(e));
    }, { once: true });

    // PAGE 1: Heart click -> page2
    btn.addEventListener('click', () => {
      page1.style.display = 'none';
      page2.style.display = 'flex';
      typeWriter();
    });

    // PAGE 2: GIF click -> page3
    gifLink.addEventListener('click', (e) => {
      e.preventDefault();
      page2.style.display = 'none';
      page3.style.display = 'flex';
    });

    // BACK buttons
    document.getElementById('backButton2').addEventListener('click', () => {
      page2.style.display = 'none';
      page1.style.display = 'flex';
    });
    document.getElementById('backButton3').addEventListener('click', () => {
      page3.style.display = 'none';
      page2.style.display = 'flex';
    });

    // PAGE 3: Floating hearts
    page3.addEventListener('click', function(e) {
      if (e.target.closest('.content-box')) return;
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '🖤❤️';
      const size = 20 + Math.random() * 20;
      heart.style.fontSize = size + 'px';
      heart.style.left = e.clientX - size/2 + 'px';
      heart.style.top = e.clientY - size/2 + 'px';
      page3.appendChild(heart);
      setTimeout(() => heart.remove(), 2500);
    });

    // Typewriter text
    const msg = "I Love You So Much ❤️";
    let i = 0;
    function typeWriter() {
      if(i < msg.length){
        textEl.innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeWriter, 100);
      }
    }
  </script>

</body>
</html>
